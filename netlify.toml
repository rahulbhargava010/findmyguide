[build]
  command = "npm run build"
  publish = "frontend/public"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/sitemap.xml"
  to = "/api/seo/sitemap.xml"
  status = 200

[[redirects]]
  from = "/location/*"
  to = "/discover.html"
  status = 200

[[redirects]]
  from = "/specialty/*"
  to = "/discover.html"
  status = 200
